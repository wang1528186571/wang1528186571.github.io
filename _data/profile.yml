short_bio: >-
  <p>
      My current research centers on adversarial patches and textures across both digital and physical domains. Specifically, I explore how these vulnerabilities apply to complex, real-world scenarios, 
      with a strong emphasis on autonomous driving and drone-based vision systems.
  </p>
  <p>
      My research group is actively seeking highly motivated interns with a background or strong interest in computer vision and 3D reconstruction. 
      If you are passionate about this line of work, I encourage you to reach out. Furthermore, 
      candidates who demonstrate exceptional performance during their internship will be strongly considered for a transition into our Ph.D. program.
  </p>

